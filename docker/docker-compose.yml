services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - minio
    environment:
      DATABASE_URL: "file:./data/dev.db"
      REDIS_URL: "redis://:0DEc%24268b%23476210Ff%21@39.91.167.69:6379"
      S3_ENDPOINT: http://39.91.167.69:9100
      S3_BUCKET: ai-video-studio
      S3_ACCESS_KEY: root
      S3_SECRET_KEY: dachkj123
      S3_REGION: us-east-1
    volumes:
      - app-data:/app/data

  workers:
    build:
      context: ..
      dockerfile: docker/Dockerfile.workers
    depends_on:
      - minio
    environment:
      DATABASE_URL: "file:./data/dev.db"
      REDIS_URL: "redis://:0DEc%24268b%23476210Ff%21@39.91.167.69:6379"
      S3_ENDPOINT: http://39.91.167.69:9100
      S3_BUCKET: ai-video-studio
      S3_ACCESS_KEY: root
      S3_SECRET_KEY: dachkj123
      S3_REGION: us-east-1
    volumes:
      - app-data:/app/data
    deploy:
      replicas: 2

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

volumes:
  app-data:
  miniodata:
